version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=nam.dev
      - RABBITMQ_DEFAULT_PASS=Nam12345@
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - network_infra
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7.0
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - network_infra
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass Nam12345@
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data/redis
    networks:
      - network_infra
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:  # đây chỉ là giao diện tương tác mongo
    image: mongo-express:latest
    container_name: mongo-express
    restart: unless-stopped
    ports:
      - "8085:8081"
    environment:
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017/
    networks:
      - network_infra
    depends_on:
      mongo: 
        condition: service_healthy

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:Nam12345@
    ports:
      - "8086:8081"
    networks:
      - network_infra
    depends_on:
      redis:
        condition: service_healthy

# worker để sau
# websocket để sau
  
volumes:
  mongo_data:
  rabbitmq_data:
  redis_data:

networks:
  network_infra:
    name: network_infra 
    driver: bridge
